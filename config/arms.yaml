# Arms reach: train and run PPO for arm-only ball reach.
# Use: arm_train_mac --config config/arms.yaml
#      run_simulation --config config/arms.yaml
# Paths are relative to repo root. Env vars (ARM_ID, TOTAL_STEPS) override YAML.

scene:
  arm_id: panda
  # For Z1: set model_path: "scenes/industrial_arm_reaching/models/z1scene.xml" to use proven industrial scene
  model_path: null   # optional; null = use composed scene from registry
  ball_mode: shared   # "shared" = 1 ball, all arms reach; "per_arm" = N balls for N arms
  per_arm_policies: false  # true = train/run separate policy per arm (multi-arm only)

train:
  total_steps: 300000
  # Match original Z1 industrial training (worked well): reward_style "z1" = no time/jerk/move-away
  # penalties, 0.05 action penalty, 50/50 ctrl blend, registry reach_min only.
  reward_style: z1   # "z1" | "arms"
  # reach_min_mode: "auto" = infer from arm model (samples workspace, uses 10th percentile)
  #   "registry" = use fraction/floor overrides below
  reach_min_mode: "auto"
  reach_min_fraction: null  # when registry mode: min = this * reach_max (e.g. 0.55)
  reach_min_floor: null     # when registry mode: ball never closer than this (m)
  # Scale actions so joints closer to EE move more (reduces getting stuck)
  ee_priority_scale: true
  ctrl_blend_new: null      # null = 0.5 (z1) or 0.3 (arms). Lower (e.g. 0.4) = smoother motion
  reward_time_penalty: 0.0005
  reward_smoothness: 0.02
  reward_move_away_penalty: 0.5
  policy_dir: policies
  # PPO (optional overrides; defaults used if omitted)
  n_steps: 2048
  batch_size: 128
  n_epochs: 10
  learning_rate: 0.0003
  seed: 42
  device: null       # null = auto (mps on Mac if available else cpu)
  use_mps: false

run:
  # policy_path: set explicitly, or leave null to derive from scene.arm_id + train.total_steps
  policy_path: null
  steps: 5000
  deterministic: true
  debug: false
  stochastic: false
